name: Build QuakeWorld Server Bundle for LinuxGSM

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Collect upstream versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          MVD_TAG=$(gh api repos/QW-Group/mvdsv/releases/latest --jq '.tag_name')
          MVD_DATE=$(gh api repos/QW-Group/mvdsv/releases/latest --jq '.published_at')
          MVD_URL=$(gh api repos/QW-Group/mvdsv/releases/latest --jq '.html_url')
          KTX_TAG=$(gh api repos/QW-Group/ktx/releases/latest --jq '.tag_name')
          KTX_DATE=$(gh api repos/QW-Group/ktx/releases/latest --jq '.published_at')
          KTX_URL=$(gh api repos/QW-Group/ktx/releases/latest --jq '.html_url')
          QWFWD_TAG=$(gh api repos/QW-Group/qwfwd/releases/latest --jq '.tag_name')
          QWFWD_DATE=$(gh api repos/QW-Group/qwfwd/releases/latest --jq '.published_at')
          QWFWD_URL=$(gh api repos/QW-Group/qwfwd/releases/latest --jq '.html_url')
          QTV_SHA=$(gh api repos/QW-Group/qtv/commits --jq '.[0].sha')
          QTV_DATE=$(gh api repos/QW-Group/qtv/commits --jq '.[0].commit.author.date')
          QTV_URL=$(gh api repos/QW-Group/qtv/commits --jq '.[0].html_url')
          QTV_SHORT_SHA=${QTV_SHA:0:12}

          BUILD_DATE=$(date -u +%Y%m%d)
          RELEASE_TAG="build-${BUILD_DATE}"
          OUTPUT="nquake.server.linux.${BUILD_DATE}.full.tar.xz"
          LATEST_TAG="latest"
          LATEST_OUTPUT="nquake.server.linux.latest.full.tar.xz"

          echo "mvdsv=${MVD_TAG}" >> "$GITHUB_OUTPUT"
          echo "mvdsv_date=${MVD_DATE}" >> "$GITHUB_OUTPUT"
          echo "mvdsv_url=${MVD_URL}" >> "$GITHUB_OUTPUT"
          echo "ktx=${KTX_TAG}" >> "$GITHUB_OUTPUT"
          echo "ktx_date=${KTX_DATE}" >> "$GITHUB_OUTPUT"
          echo "ktx_url=${KTX_URL}" >> "$GITHUB_OUTPUT"
          echo "qwfwd=${QWFWD_TAG}" >> "$GITHUB_OUTPUT"
          echo "qwfwd_date=${QWFWD_DATE}" >> "$GITHUB_OUTPUT"
          echo "qwfwd_url=${QWFWD_URL}" >> "$GITHUB_OUTPUT"
          echo "qtv=${QTV_SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "qtv_date=${QTV_DATE}" >> "$GITHUB_OUTPUT"
          echo "qtv_url=${QTV_URL}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "output=${OUTPUT}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_output=${LATEST_OUTPUT}" >> "$GITHUB_OUTPUT"

          echo "MVDSV: ${MVD_TAG}"
          echo "MVDSV date: ${MVD_DATE}"
          echo "KTX: ${KTX_TAG}"
          echo "KTX date: ${KTX_DATE}"
          echo "QWFWD: ${QWFWD_TAG}"
          echo "QWFWD date: ${QWFWD_DATE}"
          echo "QTV commit: ${QTV_SHORT_SHA}"
          echo "QTV date: ${QTV_DATE}"

      - name: Update README upstream status
        run: |
          set -euo pipefail

          MVD_TAG='${{ steps.versions.outputs.mvdsv }}'
          MVD_DATE_RAW='${{ steps.versions.outputs.mvdsv_date }}'
          MVD_URL='${{ steps.versions.outputs.mvdsv_url }}'
          KTX_TAG='${{ steps.versions.outputs.ktx }}'
          KTX_DATE_RAW='${{ steps.versions.outputs.ktx_date }}'
          KTX_URL='${{ steps.versions.outputs.ktx_url }}'
          QWFWD_TAG='${{ steps.versions.outputs.qwfwd }}'
          QWFWD_DATE_RAW='${{ steps.versions.outputs.qwfwd_date }}'
          QWFWD_URL='${{ steps.versions.outputs.qwfwd_url }}'
          QTV_REF='${{ steps.versions.outputs.qtv }}'
          QTV_DATE_RAW='${{ steps.versions.outputs.qtv_date }}'
          QTV_URL='${{ steps.versions.outputs.qtv_url }}'

          MVD_DATE="${MVD_DATE_RAW%%T*}"
          KTX_DATE="${KTX_DATE_RAW%%T*}"
          QWFWD_DATE="${QWFWD_DATE_RAW%%T*}"
          QTV_DATE="${QTV_DATE_RAW%%T*}"
          REFRESHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          {
            printf '%s\n' '| Component | Version | Release date (UTC) | Upstream release |'
            printf '%s\n' '| --- | --- | --- | --- |'
            printf '| MVDSV | %s | %s | [release](%s) |\n' "$MVD_TAG" "$MVD_DATE" "$MVD_URL"
            printf '| KTX | %s | %s | [release](%s) |\n' "$KTX_TAG" "$KTX_DATE" "$KTX_URL"
            printf '| QWFWD | %s | %s | [release](%s) |\n' "$QWFWD_TAG" "$QWFWD_DATE" "$QWFWD_URL"
            printf '| QTV | %s | %s | [commit](%s) |\n' "$QTV_REF" "$QTV_DATE" "$QTV_URL"
            printf '\n'
            printf 'Last refreshed (UTC): %s\n' "$REFRESHED_AT"
          } > /tmp/readme-upstream-status.md

          awk '
            BEGIN { in_block=0 }
            /<!-- BEGIN AUTO-UPDATED UPSTREAM STATUS -->/ {
              print
              while ((getline line < "/tmp/readme-upstream-status.md") > 0) print line
              in_block=1
              next
            }
            /<!-- END AUTO-UPDATED UPSTREAM STATUS -->/ {
              in_block=0
              print
              next
            }
            !in_block { print }
          ' README.md > README.md.new

          mv README.md.new README.md

      - name: Commit README updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if git diff --quiet -- README.md; then
            echo "README unchanged; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update upstream component versions in README"
          git push origin "${GITHUB_REF_NAME}"

      - name: Download nQuake distfiles snapshot assets
        run: |
          set -euo pipefail

          BASE="https://github.com/nQuake/distfiles/releases/download/snapshot"
          mkdir -p downloads

          for file in \
            sv-bin-x64.zip \
            sv-configs.zip \
            sv-maps.zip \
            sv-maps-gpl.zip \
            sv-gpl.zip \
            sv-non-gpl.zip
          do
            echo "Downloading $file"
            curl -fsSL -o "downloads/$file" "$BASE/$file"
          done

      - name: Build LinuxGSM archive
        run: |
          set -euo pipefail

          OUTPUT="${{ steps.versions.outputs.output }}"
          LATEST_OUTPUT="${{ steps.versions.outputs.latest_output }}"

          mkdir -p build/server
          for zip in downloads/*.zip; do
            unzip -qo "$zip" -d build/server
          done

          if [[ ! -f build/server/mvdsv ]]; then
            echo "::error::mvdsv binary not found after extraction"
            find build/server -maxdepth 3 -type f | sort
            exit 1
          fi

          if [[ ! -f build/server/ktx/qwprogs.so ]]; then
            echo "::error::ktx/qwprogs.so not found after extraction"
            find build/server -maxdepth 4 -type f | sort
            exit 1
          fi

          chmod +x build/server/mvdsv || true
          [[ -f build/server/qtv/qtv.bin ]] && chmod +x build/server/qtv/qtv.bin || true
          [[ -f build/server/qwfwd/qwfwd.bin ]] && chmod +x build/server/qwfwd/qwfwd.bin || true

          tar cJf "$OUTPUT" -C build/server .
          cp "$OUTPUT" "$LATEST_OUTPUT"

          md5sum "$OUTPUT" "$LATEST_OUTPUT" > MD5SUMS
          sha256sum "$OUTPUT" "$LATEST_OUTPUT" > SHA256SUMS

          echo "Created $OUTPUT"
          echo "Created $LATEST_OUTPUT"
          ls -lh "$OUTPUT" "$LATEST_OUTPUT" MD5SUMS SHA256SUMS

      - name: Create release notes
        run: |
          set -euo pipefail

          cat > release-notes-dated.md <<EOF
          ## QuakeWorld server bundle for LinuxGSM

          Build date: ${{ steps.versions.outputs.build_date }}

          Upstream reference versions:
          - MVDSV: ${{ steps.versions.outputs.mvdsv }} (${{ steps.versions.outputs.mvdsv_date }})
          - KTX: ${{ steps.versions.outputs.ktx }} (${{ steps.versions.outputs.ktx_date }})
          - QWFWD: ${{ steps.versions.outputs.qwfwd }} (${{ steps.versions.outputs.qwfwd_date }})
          - QTV commit: ${{ steps.versions.outputs.qtv }} (${{ steps.versions.outputs.qtv_date }})

          Source distfiles:
          - https://github.com/nQuake/distfiles/releases/tag/snapshot

          Files:
          - ${{ steps.versions.outputs.output }}
          - ${{ steps.versions.outputs.latest_output }}
          - MD5SUMS
          - SHA256SUMS
          EOF

          cat > release-notes-latest.md <<EOF
          ## Latest QuakeWorld server bundle for LinuxGSM

          Refreshed from the scheduled build on ${{ steps.versions.outputs.build_date }}.

          Upstream reference versions:
          - MVDSV: ${{ steps.versions.outputs.mvdsv }} (${{ steps.versions.outputs.mvdsv_date }})
          - KTX: ${{ steps.versions.outputs.ktx }} (${{ steps.versions.outputs.ktx_date }})
          - QWFWD: ${{ steps.versions.outputs.qwfwd }} (${{ steps.versions.outputs.qwfwd_date }})
          - QTV commit: ${{ steps.versions.outputs.qtv }} (${{ steps.versions.outputs.qtv_date }})

          Source distfiles:
          - https://github.com/nQuake/distfiles/releases/tag/snapshot

          Stable file:
          - ${{ steps.versions.outputs.latest_output }}

          Checksums:
          - MD5SUMS
          - SHA256SUMS
          EOF

      - name: Publish dated GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ steps.versions.outputs.release_tag }}"

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --title "QuakeWorld bundle ${{ steps.versions.outputs.build_date }}" \
              --notes-file release-notes-dated.md
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "QuakeWorld bundle ${{ steps.versions.outputs.build_date }}" \
              --notes-file release-notes-dated.md
          fi

          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            --clobber \
            "${{ steps.versions.outputs.output }}" \
            MD5SUMS \
            SHA256SUMS

      - name: Publish moving latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ steps.versions.outputs.latest_tag }}"

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --title "QuakeWorld bundle latest" \
              --notes-file release-notes-latest.md
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "QuakeWorld bundle latest" \
              --notes-file release-notes-latest.md
          fi

          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            --clobber \
            "${{ steps.versions.outputs.latest_output }}" \
            MD5SUMS \
            SHA256SUMS
